spring.application.name=step11-boot-mybatis


# 서버 포트 설정 (기본 8080 대신 8888 사용)
server.port=8888

# Thymeleaf 설정
# 개발 시 수정사항을 즉시 확인하기 위해 캐시를 끕니다.
spring.thymeleaf.cache=false
# 파일 확장자 설정 (.html)
spring.thymeleaf.suffix=.html
# 템플릿 파일이 위치한 경로
spring.thymeleaf.prefix=classpath:/templates/

# MyBatis 설정
# MyBatis 매퍼 파일 위치 설정
mybatis.mapper-locations=classpath:/mappers/**/*.xml
# 별칭 설정
mybatis.type-aliases-package=com.spring.dto
# DB 컬럼 snake_case → Java 필드 camelCase 자동 변환
# 예: created_at → createdAt, is_available → isAvailable
mybatis.configuration.map-underscore-to-camel-case=true

# MySQL 데이터베이스 연결 설정
spring.datasource.url=jdbc:mysql://localhost:3306/kiosk_db
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver