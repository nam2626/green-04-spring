<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <nav>
        <h1>키오스크 관리</h1>
        <a href="/menus">메뉴 목록</a>
        <a href="/menus/new">메뉴 등록</a>
    </nav>
    <div class="container">
        <!-- 추가, 삭제, 수정 성공 메세지 출력 영역 -->
        <div class="alert-box" th:if="${successMessage}" th:text="${successMessage}"></div>
        <!-- 페이지 헤더 -->
        <div class="page-header">
            <h2>메뉴 목록 <span th:text="|전체 ${#lists.size(menus)}건|"></span></h2>
            <a href="/menus/new">메뉴 등록</a>
        </div>
        <!-- 검색 폼 영역 -->
        <div class="search-area">

        </div>
        <!-- 카테고리 필터 영역 -->
        <div class="category-filter-area">

        </div>

        <div class="menu-list" th:unless="${#lists.isEmpty(menus)}">
            <table>
                <thead>
                    <tr>
                        <th>번호</th>
                        <th>메뉴명</th>
                        <th>가격</th>
                        <th>카테고리</th>
                        <th>판매여부</th>
                        <th>등록일</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="menu : ${menus}">
                        <td th:text="${menu.id}"></td>
                        <td th:text="${menu.name}"></td>
                        <td th:text="${menu.price}"></td>
                        <td th:text="${menu.category}"></td>
                        <td th:text="${menu.available ? '품절' : '판매중'}"></td>
                        <td th:text="${#temporals.format(menu.createdAt, 'yyyy-MM-dd')}"></td>
                        <td>
                            <a href="#" th:href="@{/menus/{id}/edit(id=${menu.id})}">수정</a>
                            <a href="#" th:href="@{/menus/{id}/delete(id=${menu.id})}" onclick="return confirm('정말로 삭제하시겠습니까?')">삭제</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
