spring.application.name=step15-security-basic

# JPA가 실행할 때마다 엔티티 기준으로 테이블을 새로 만든다. 학습용 설정이며 기존 데이터가 지워질 수 있다.
spring.jpa.hibernate.ddl-auto=update
# SQL 원문 출력은 끄고, 출력할 경우 읽기 좋은 모양으로 정렬하도록 설정한다.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# JPA가 MySQL 문법에 맞는 SQL을 만들도록 지정한다.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 내장 웹 서버가 사용할 포트 번호이다.
server.port=8888

# 연결할 MySQL DB 주소와 계정 정보이다.
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT 서명에 사용할 비밀 키이다. 실제 운영 환경에서는 소스에 적지 말고 환경 변수 등으로 분리해야 한다.
jwt.secret=843E26E7163A480B6CAD4B2A98E3EFD7502C8471F75C27ADB4BCF82082D2F9F04C2D702D57D55C25B2591591FF3F305256614EB2797D2F3FE9D5474A0788C371
# 토큰 만료 시간은 밀리초 단위이다: Access Token 30분, Refresh Token 7일.
jwt.access-expiration=1800000
jwt.refresh-expiration=604800000
