spring.application.name=step15-security-basic

# 엔티티와 DB 스키마의 차이를 반영한다. update는 기존 데이터를 유지하지만 운영에서는 마이그레이션 도구 사용이 안전하다.
spring.jpa.hibernate.ddl-auto=update
# SQL 원문 출력은 끄고, 출력할 경우 읽기 좋은 모양으로 정렬하도록 설정한다.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# JPA가 MySQL 문법에 맞는 SQL을 만들도록 지정한다.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 내장 웹 서버가 사용할 포트 번호이다.
server.port=8888

# 연결할 MySQL DB 주소와 계정 정보이다.
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT 서명에 사용할 비밀 키이다. 서명 키가 노출되면 공격자가 유효한 토큰을 만들 수 있으므로
# 실제 운영 환경에서는 소스 저장소에 커밋하지 말고 환경 변수나 Secret Manager로 분리해야 한다.
jwt.secret=843E26E7163A480B6CAD4B2A98E3EFD7502C8471F75C27ADB4BCF82082D2F9F04C2D702D57D55C25B2591591FF3F305256614EB2797D2F3FE9D5474A0788C371
# 토큰 만료 시간은 밀리초 단위이다: Access Token 30분, Refresh Token 7일.
jwt.access-expiration=1800000
jwt.refresh-expiration=604800000
