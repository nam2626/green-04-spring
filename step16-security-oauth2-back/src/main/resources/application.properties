spring.application.name=step16-security-oauth2-back

# JPA가 엔티티 변경 내용을 참고해 테이블을 자동으로 보정한다.
# 학습용으로는 편하지만 운영 환경에서는 validate 또는 migration 도구 사용을 권장한다.
spring.jpa.hibernate.ddl-auto=update

# 실행되는 SQL을 콘솔에 출력할지 여부와 SQL 줄바꿈 형식을 설정한다.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# MySQL 문법에 맞는 SQL을 생성하도록 Hibernate 방언을 지정한다.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 백엔드 서버 포트이다. 프론트엔드 React 개발 서버의 3000번 포트와 구분된다.
server.port=8888

# MySQL 접속 정보이다. datasource는 Spring Boot가 DB 연결 풀을 만들 때 사용한다.
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT 서명 비밀 키와 만료 시간이다.
# access-expiration은 API 호출용 Access Token 수명, refresh-expiration은 재발급용 Refresh Token 수명이다.
# 값은 밀리초 단위이며 1800000은 30분, 604800000은 7일이다.
jwt.secret=843E26E7163A480B6CAD4B2A98E3EFD7502C8471F75C27ADB4BCF82082D2F9F04C2D702D57D55C25B2591591FF3F305256614EB2797D2F3FE9D5474A0788C371
jwt.access-expiration=1800000
jwt.refresh-expiration=604800000

# Google OAuth2 설정
# client-id와 client-secret은 .env 파일에서 읽어 온다.
# scope는 Google에서 어떤 사용자 정보를 받을지 정하며, email과 profile을 요청한다.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# .env 파일 로드
# optional이므로 .env 파일이 없어도 애플리케이션 시작 자체는 시도한다.
spring.config.import=optional:file:.env[.properties]

# 프론트엔드 주소
# OAuth2 로그인 성공 후 OAuth2SuccessHandler가 이 주소의 /oauth2/callback으로 토큰을 붙여 리다이렉트한다.
app.frontend-url=http://localhost:3000
