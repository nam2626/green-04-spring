<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>메뉴 등록/수정</title>
</head>
<body>
<h1>키오스크 관리 페이지 - 메뉴 등록/수정</h1>
<nav>
    <a th:href="@{/menus}">메뉴목록</a>
    <a th:href="@{/menus/new}">메뉴 등록</a>
</nav>
<div class="container">
    <!-- 
        th:action: 폼 전송 경로 결정 (ID가 없으면 등록(/menus), 있으면 수정(/menus/{id}/edit))
        th:object: 컨트롤러에서 전달한 'menu' 객체와 폼을 바인딩
        method="post": 데이터 전송 방식 (POST)
    -->
    <form th:action="${menu.id == null} ? @{/menus} : @{/menus/{id}/edit(id=${menu.id})}" th:object="${menu}" method="post">
        
        <label for="name">메뉴명</label>
        <!-- th:field="*{name}": id="name", name="name", value="..." 속성을 자동 생성해줌 -->
        <input type="text" id="name" th:field="*{name}"><br>
        <!-- 검증 오류 메시지 표시 (에러가 있을 경우에만 출력) -->
        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></p>

        <label for="category">카테고리</label>
        <select id="category" th:field="*{category}">
            <!-- categories 리스트를 순회하며 옵션 생성 -->
            <option th:each="cat : ${categories}" 
                    th:text="${cat}" 
                    th:value="${cat}"
                    th:selected="${menu.category == cat}"></option>
        </select><br>

        <label for="price">금액 </label>
        <input type="number" id="price" th:field="*{price}"><br>
        <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" style="color:red;"></p>

        <label for="description">설명</label>
        <textarea id="description" th:field="*{description}"></textarea><br>

        <input type="checkbox" id="available" th:field="*{available}">
        <label for="available">판매 가능 여부</label>
        <br>
        
        <!-- ID 유무에 따라 버튼 글자 변경 -->
        <button th:text="${menu.id == null} ? '등록하기' : '수정하기'"></button>
    </form>
</div>
</body>
</html>
