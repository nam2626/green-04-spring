<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>키오스크 관리 페이지</h1>
<nav>
    <a href="">메뉴목록</a>
    <a href="">메뉴 등록</a>
</nav>
<div class="container">
    <form th:action="@{/menus/{id}/edit(id=${menu.id})}" th:object="${menu}" method="post">
        <label for="name">메뉴명</label>
        <input type="text" id="name" name="name" th:field="*{name}"
               th:value="${menu.name}"><br>
        <label for="">카테고리</label>
        <select th:field="*{category}">
            <option th:each="category : ${categories}" th:text="${category}"
                    th:value="${category}"
                    th:selected="${menu.category == category}"></option>
        </select><br>
        <label for="price">금액 </label>
        <input type="number" id="price" name="price"
               th:field="*{price}" th:value="${menu.price}"><br>
        <label for="description">설명</label>
        <textarea id="description" name="description"
                  th:field="*{description}" th:value="${menu.description}"></textarea><br>
        <input type="checkbox" id="available" name="available" th:field="*{available}"
               th:checked="${menu.available}">
        <label for="available">판매 가능</label>
        <br>
        <button>수정</button>
    </form>
</div>
</body>
</html>
