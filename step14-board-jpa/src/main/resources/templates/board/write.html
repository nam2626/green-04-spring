<!DOCTYPE html>
<!-- 
  xmlns:th="http://www.thymeleaf.org": Thymeleaf 템플릿 문법 선언
  th:replace="~{layout/base :: layout(~{::title}, ~{::section})}": 공통 base 레이아웃 프래그먼트 적용
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- th:text: 수정 모드(postId 존재 시)면 '게시글 수정', 등록 모드면 '게시글 작성'으로 타이틀 동적 표기 -->
  <title th:text="${postId != null} ? '게시글 수정' : '게시글 작성'">Document</title>
</head>
<body>
  <section class="write-page">
    <!-- Quill 텍스트 에디터의 Snow 테마용 스타일시트 로드 -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
    <!-- Quill 텍스트 에디터 핵심 라이브러리 자바스크립트 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    
    <div class="write-header">
      <h2 th:text="${postId != null} ? '게시글 수정' : '게시글 작성'"></h2>
      <!-- 취소하고 돌아갈 목록 경로 설정. 현재 페이지 번호가 없으면 기본값인 0페이지로 매핑합니다. -->
      <a class="btn btn-ghost" th:href="@{/board(page=${page == null ? 0 : page})}">목록으로</a>
    </div>
    
    <!-- 
      th:action: 
        수정(postId != null) 상태면 '/board/{id}/edit'로 POST 요청을 보내고,
        신규(postId == null) 상태면 '/board/new'로 POST 요청을 보냅니다.
      enctype="multipart/form-data":
        파일 업로드(MultipartFile)가 폼 안에 포함될 때, 브라우저가 파일을 바이너리 형태로 
        안전하게 전송할 수 있도록 설정하는 필수 인코딩 타입입니다.
      th:object="${form}": 
        컨트롤러에서 넘겨준 PostFormDTO 객체를 폼 데이터 검증의 타겟 커맨드 객체로 매핑합니다.
    -->
    <form class="post-form" th:action="${postId != null} ? @{/board/{id}/edit(id=${postId})} : @{/board/new}" method="post" enctype="multipart/form-data" th:object="${form}">
      
      <!-- 제목 입력 영역 -->
       <div class="form-group">
         <label for="title">제목</label>
         <!-- th:field="*{title}": form 객체의 title 필드와 바인딩 -->
         <input class="form-control post-title-input" type="text" placeholder="제목을 입력하세요" th:field="*{title}">
         <!-- 제목 검증 실패 시 에러 메시지 노출 구역 -->
         <div class="field-error" th:errors="*{title}"></div>
        </div>
        
      <!-- Quill 에디터 내용 입력 영역 -->
      <div class="form-group">
        <label for="quill-editor">내용</label>
        <!-- 에디터가 표시될 영역. DB에 저장되어 있던 기존 content 내용(HTML 태그 포함)을 초기값으로 주입하기 위해 th:utext를 씁니다. -->
        <div id="quill-editor" th:utext="*{content}"></div>
        
        <!-- 
          [중요] Quill 에디터는 일반 textarea가 아닌 div 요소를 사용해 UI를 띄우므로 
          form 전송 시 에디터 내용을 백엔드로 보내기 위해 실제 전송용으로 쓸 hidden 타입의 input 필드를 둡니다.
          th:field="*{content}"를 통해 이 hidden 필드의 name과 id가 content로 지정됩니다.
        -->
        <input type="hidden" th:field="*{content}">
        <!-- 내용 검증 실패 시 에러 메시지 노출 구역 -->
        <div class="field-error" th:errors="*{content}"></div>
      </div>
      
      <!-- 첨부파일 업로드 선택 구역 (multiple 속성으로 다중 파일 업로드 지원) -->
       <div class="form-group file-field">
          <label>파일첨부</label>
          <input class="file-input" type="file" name="files" multiple>
       </div>
       
       <!-- [수정 모드일 때만 활성화] 기존에 이미 업로드되어 있는 첨부 파일 목록 조회 및 개별 삭제 패널 -->
        <div class="attachment-panel" th:if="${postId != null and attachments != null and !attachments.isEmpty() }">
          <h3>첨부파일</h3>
          <ul class="attachment-list">
            <li th:each="att : ${attachments}">
              <span th:text="${att.originFileName}"></span>
              <!-- 개별 파일 삭제용 미니 폼 -->
              <form th:action="@{/attachments/{id}/delete(id=${att.id})}" method="post"
              onsubmit="return confirm('정말로 파일을 삭제하시겠습니까?')">
                <button class="btn btn-danger" type="submit">삭제</button>
              </form>
            </li>
          </ul>
        </div>
        
        <div class="write-actions">
          <button class="btn btn-primary" type="submit" th:text="${postId != null} ? '수정하기' : '등록하기'"></button>
          <button class="btn btn-ghost" type="button" onclick="history.back();">취소</button>
        </div>
    </form>
    
    <script>
      // Quill 에디터의 툴바 옵션들을 구성하는 설정 배열입니다.
      const toolbarOptions = [
        ['bold', 'italic', 'underline', 'strike'],        // 글꼴 스타일 옵션
        ['blockquote', 'code-block'],                     // 인용구, 코드블록
        ['link', 'image', 'video', 'formula'],            // 외부 링크 및 미디어 첨부
    
        [{ 'header': 1 }, { 'header': 2 }],               // 제목 크기(H1, H2) 지정
        [{ 'list': 'ordered'}, { 'list': 'bullet' }, { 'list': 'check' }], // 리스트 종류
        [{ 'script': 'sub'}, { 'script': 'super' }],      // 첨자
        [{ 'indent': '-1'}, { 'indent': '+1' }],          // 들여쓰기/내어쓰기
        [{ 'direction': 'rtl' }],                         // 글자 방향(오른쪽에서 왼쪽)
    
        [{ 'size': ['small', false, 'large', 'huge'] }],  // 폰트 크기
        [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
    
        [{ 'color': [] }, { 'background': [] }],          // 글자색 및 배경색
        [{ 'font': [] }],                                 // 서체
        [{ 'align': [] }],                                // 정렬
    
        ['clean']                                         // 모든 스타일 포맷 초기화
      ];

      // 웹 브라우저의 윈도우가 모두 로드된 시점에 에디터를 생성합니다.
      window.onload = () => {
        // Quill 에디터를 #quill-editor DOM 요소에 적용시킵니다.
        const quill = new Quill('#quill-editor', {
          modules: {
            toolbar: toolbarOptions
          },
          theme: 'snow' // 기본 'snow' 테마 적용
        });
        
        // 폼이 최종적으로 전송(submit)되려 할 때 가로채는 이벤트 헨들러입니다.
        document.querySelector(".post-form").onsubmit = (e) => {
          // 콘솔을 통해 에디터 내용 로그를 확인합니다.
          console.log(quill.getContents());
          console.log(quill.getText());
          
          // [핵심] Quill 에디터의 모든 작성 내용을 의미론적 HTML 태그 형태로 변환하여 읽어옵니다.
          console.log(quill.getSemanticHTML());
          
          // 추출한 HTML 형식의 본문 데이터를 폼 내부의 hidden input 필드(#content)의 value로 바인딩하여 
          // 스프링 MVC 백엔드로 함께 안전하게 전송될 수 있도록 처리합니다.
          document.querySelector("#content").value = quill.getSemanticHTML();  
        }
      }
    </script>
  </section>
</body>
</html>
