<!DOCTYPE html>
<!-- 
  xmlns:th="http://www.thymeleaf.org": 
    이 HTML 문서 내에서 Thymeleaf 템플릿 엔진 문법(th:로 시작하는 속성)을 사용하겠다고 네임스페이스를 선언합니다.
  th:replace="~{layout/base :: layout(~{::title}, ~{::section})}":
    공통 레이아웃 파일인 templates/layout/base.html 파일에 정의된 layout 프래그먼트로 이 페이지의 레이아웃을 교체합니다.
    이때 매개변수로 현재 문서의 <title> 태그와 <section> 태그의 내용을 실어서 보냅니다.
-->
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글</title>
</head>
<body>
  <!-- layout/base.html의 section 자리에 삽입될 실제 본문 내용 구역입니다. -->
  <section class="detail-page">
     <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
    <article class="post-detail-card">
      <div class="detail-header">
        <!-- th:text: DB에서 넘겨받은 post 객체의 title 값을 이 h2 태그의 텍스트 콘텐츠로 채워넣습니다. -->
        <h2 th:text="${post.title}"></h2>
        <!-- th:href="@{/board(page=${page})}": 
             Thymeleaf의 URL 표현식(@{...})입니다. 컨트롤러로부터 전달받은 page 값을 쿼리 파라미터(?page=X) 형태로 바인딩하여 
             이전의 리스트 페이지 위치로 올바르게 복귀할 수 있게 경로를 생성합니다. -->
        <a class="btn btn-ghost" th:href="@{/board(page=${page})}">목록으로</a>
      </div>
      <div class="post-info">
        <p>작성자 : <span th:text="${post.member.nickname}"></span></p>
        <!-- #temporals.format: Thymeleaf에서 Java 8의 LocalDateTime 형식을 원하는 날짜 포맷 패턴으로 출력하기 위해 사용하는 유틸리티 객체 메서드입니다. -->
        <p>작성일 : <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
        | 조회수 : <span th:text="${post.viewCount}"></span>
        </p>
      </div>
      <!-- th:utext: 
           일반 th:text와 달리, HTML 태그가 포함되어 있을 때 이스케이프(Escape) 처리를 하지 않고 
           브라우저가 HTML 코드로 직접 인식하고 렌더링하도록 텍스트를 파싱하여 채워넣습니다. 
           (Quill 웹에디터가 HTML 태그 형태로 내용을 저장하므로 utext를 사용해야 본문이 올바르게 보입니다) -->
      <div class="post-content" th:utext="${post.content}"></div>
      
      <!-- 첨부 파일 목록 출력 (첨부파일 리스트가 비어있지 않을 때만 이 구역을 화면에 렌더링합니다) -->
      <div class="file-list" th:if="${!attachments.isEmpty()}">
        <h3>첨부파일</h3>
        <!-- th:each="file : ${attachments}": 
             전달받은 첨부파일 컬렉션을 순회하며 템플릿 루프를 돕니다. (자바의 foreach와 유사함) -->
        <p th:each="file : ${attachments}">
          <a th:href="@{/attachments/download/{id}(id=${file.id})}" th:text="${file.originalName}"></a>
          <span th:text="${file.fileSize}"></span>
        </p>
      </div>
      
      <!-- 게시글 좋아요 및 싫어요 클릭 버튼 영역 -->
      <div class="post-footer">
        <button class="reaction-btn content-like" type="button">👍좋아요 <span th:text="${postReaction.likes}">0</span></button>
        <button class="reaction-btn content-dislike" type="button">👎싫어요 <span th:text="${postReaction.dislikes}">0</span></button>
      </div>
      
      <!-- 게시글 삭제/수정 제어 버튼 (로그인을 하였고, 로그인된 사용자의 ID와 게시글 작성자의 ID가 일치할 때만 수정/삭제 버튼을 화면에 띄웁니다) -->
      <div class="detail-actions" th:if="${session.loginMember != null and session.loginMember.id == post.member.id}">
        <div class="owner-actions">
          <a class="btn btn-ghost" th:href="@{/board/{id}/edit(id=${post.id},page=${page})}">수정</a>
          <a class="btn btn-danger" th:href="@{/board/{id}/delete(id=${post.id})}">삭제</a>
        </div>
      </div>
    </article>
    
    <!-- 댓글 구역 -->
    <section class="comment-section">
      <h3>댓글</h3>
      
      <!-- 댓글 입력 폼 (로그인 세션이 존재할 때만 활성화) -->
      <div class="comment-form-wrap" th:if="${session.loginMember != null}">
        <!-- th:object="${commentForm}": 폼 데이터를 전송할 때, 스프링 MVC의 폼 검증 지원을 위해 묶어둘 커맨드 객체를 지정합니다. -->
        <form class="comment-form" th:action="@{/comments/post/{id}(id=${post.id})}" method="post"
          th:object="${commentForm}">
          <!-- th:field="*{content}": 지정된 커맨드 객체(commentForm) 내의 content 필드와 이 textarea를 바인딩하여 자동으로 name, id, value 속성을 맞춰줍니다. -->
          <textarea class="comment-textarea" th:field="*{content}" placeholder="댓글을 입력해주세요"></textarea>
          <div class="comment-form-actions">
            <!-- th:errors="*{content}": 댓글 등록 시 검증 실패 오류(@NotBlank 위반 등)가 있다면 스프링이 채워준 에러 메시지를 이 위치에 출력합니다. -->
            <div class="field-error" th:errors="*{content}"></div>
            <button class="btn btn-primary" type="submit">댓글 등록</button>
          </div>
        </form>
      </div>
      <!-- 비로그인 시 댓글 작성 제한 안내 -->
      <div class="login-required" th:if="${session.loginMember == null}">
        <p>로그인 하셔야 댓글일 입력하실 수 있습니다.</p>
      </div>
      
      <!-- 댓글 목록 영역 (id="comments"를 통해 댓글 관련 동작 완료 시 이 구역으로 포커싱 앵커 이동을 하도록 돕습니다) -->
       <div class="comment-list" id="comments">
          <div class="empty-comments" th:if="${comments.isEmpty()}">
            첫번째 댓글을 남겨보세요
          </div>
          <!-- 댓글 목록 데이터 반복 출력 -->
          <div class="comment-item" th:each="comment : ${comments}">
            <ul class="comment-info">
              <li>작성자 : <span th:text="${comment.member.nickname}"></span></li>
              <li>작성일 : <span th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></span></li>
              <!-- 댓글 작성자 본인에게만 삭제 버튼 노출 -->
              <li th:if="${session.loginMember != null and session.loginMember.id == comment.member.id}">
                <a class="comment-delete" th:href="@{/comments/{id}/delete(id=${comment.id})}" onclick="return confirm('정말로 삭제하시겠습니까?')">삭제</a>
              </li>
              <li>
                <button class="reaction-btn reaction-btn--small" type="button" th:onclick="'commentReactionClick(' + ${comment.id} + ', \'like\')'">👍좋아요 <span th:text="${commentReactions[comment.id].likes}">0</span></button>
                <button class="reaction-btn reaction-btn--small" type="button" th:onclick="'commentReactionClick(' + ${comment.id} + ', \'dislike\')'">👎싫어요 <span th:text="${commentReactions[comment.id].dislikes}">0</span></button>
              </li>
            </ul>
            <hr>
            <div class="comment-content" th:text="${comment.content}"></div>
          </div>
       </div>
    </section>
    
    <!-- 비동기 리액션 처리를 위한 클라이언트 스크립트 영역 -->
    <script th:inline="javascript">
      // Thymeleaf가 렌더링될 때 서버에 담겨있던 post.id(게시글 기본키) 값을 자바스크립트 변수로 안전하게 이식합니다.
      const POST_ID = [[${post.id}]];

      // 좋아요 또는 싫어요 버튼 클릭 시 실행될 이벤트 핸들러 함수입니다.
      function contentReactionClick(e){
        // 1. 요청을 보낼 REST API 기본 URL 주소를 생성합니다.
        let url = `/reaction/post/${POST_ID}`;
        
        // 2. 클릭된 버튼의 클래스명에 'content-like'가 포함되어 있는지 여부에 따라 
        // 서버의 좋아요(/like) 혹은 싫어요(/dislike) 맵핑 엔드포인트 경로를 덧붙입니다.
        if(e.target.className.indexOf('content-like') != -1)
          url += '/like';
        else
          url += '/dislike';

        // 3. fetch API를 호출해 비동기 HTTP GET 요청을 백엔드에 보냅니다.
        fetch(url)
          .then(res => {
            // 서버가 응답한 HTTP Response 바디의 JSON 문자열 데이터를 자바스크립트 객체로 역직렬화(Parse)합니다.
            return res.json();
          })
          .then(data => {
            // 4. 서버로부터 리턴받은 최신 집계 데이터(data.likes 및 data.dislikes)를 
            // 화면 상의 좋아요/싫어요 숫자 영역(span 태그 내부)에 실시간으로 반영하여 부분 업데이트를 해줍니다.
            document.querySelector(".content-like > span").innerHTML = data.likes;
            document.querySelector(".content-dislike > span").innerHTML = data.dislikes;
          })
          .catch(error => {
            console.error("리액션 처리 중 에러 발생:", error);
          });
      }

      // 페이지 로드가 완전히 완료되었을 때 실행되는 초기화 블록입니다.
      window.onload = () => {
        // 화면의 좋아요(.content-like) 및 싫어요(.content-dislike) 버튼 객체를 모두 찾아 클릭 이벤트 리스너를 바인딩합니다.
        document.querySelectorAll(".content-like, .content-dislike").forEach(item => {
          item.addEventListener('click', contentReactionClick);
        });
      }
    </script>
  </section>
</body>
</html>
