<!DOCTYPE html>
<html lang="ko"  xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
</head>
<body>
  <section class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h2>로그인</h2>
        <p>계정으로 로그인하고 게시판을 이용하세요.</p>
      </div>
      <div class="form-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
      <form class="auth-form" th:action="@{/auth/login}" method="post">
        <div class="form-group">
          <label for="username">아이디</label>
          <input class="form-control" type="text" id="username" name="username" placeholder="아이디를 입력하세요" autofocus required>
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input class="form-control" type="password" id="password" name="password" placeholder="암호를 입력하세요." required>
        </div>
        <div class="auth-actions auth-actions--stack">
          <button class="btn btn-primary" type="submit">로그인</button>
          <a class="btn btn-ghost" th:href="@{/auth/register}">회원가입</a>
          <a class="btn btn-ghost" href="javascript:history.back();">뒤로가기</a>
        </div>
      </form>
    </div>

  </section>
</body>
</html>
