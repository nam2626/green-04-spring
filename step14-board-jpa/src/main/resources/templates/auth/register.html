<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
</head>
<body>
  <section>
    <h2>회원가입</h2>
    <div>
      <form th:action="@{/auth/register}" method="post" th:object="${form}">
        <div>     
          <label for="username">아이디</label>
          <input type="text" th:field="*{username}" placeholder="아이디 입력하세요">
          <div th:errors="*{username}"></div>
        </div>
        <div>     
          <label for="password">비밀번호</label>
          <input type="password" th:field="*{password}" placeholder="암호 입력하세요">
          <div th:errors="*{password}"></div>
        </div>
        <div>     
          <label for="nickname">닉네임</label>
          <input type="text" th:field="*{nickname}" placeholder="닉네임 입력하세요">
          <div th:errors="*{nickname}"></div>
        </div>
        <button>가입하기</button>
        <button type="button" onclick="history.back();">취소</button>
      </form>

    </div>

  </section>
</body>
</html>
