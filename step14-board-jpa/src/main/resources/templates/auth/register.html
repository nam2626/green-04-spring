<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
</head>
<body>
  <section class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h2>회원가입</h2>
        <p>게시판 이용을 위한 계정을 만들어 주세요.</p>
      </div>
      <form class="auth-form" th:action="@{/auth/register}" method="post" th:object="${form}">
        <div class="form-error" th:if="${#fields.hasGlobalErrors()}">
          <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
        </div>
        <div class="form-group">
          <label for="username">아이디</label>
          <input class="form-control" type="text" th:field="*{username}" placeholder="아이디 입력하세요">
          <div class="field-error" th:errors="*{username}"></div>
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input class="form-control" type="password" th:field="*{password}" placeholder="암호 입력하세요">
          <div class="field-error" th:errors="*{password}"></div>
        </div>
        <div class="form-group">
          <label for="nickname">닉네임</label>
          <input class="form-control" type="text" th:field="*{nickname}" placeholder="닉네임 입력하세요">
          <div class="field-error" th:errors="*{nickname}"></div>
        </div>
        <div class="auth-actions">
          <button class="btn btn-primary" type="submit">가입하기</button>
          <button class="btn btn-ghost" type="button" onclick="history.back();">취소</button>
        </div>
      </form>

    </div>

  </section>
</body>
</html>
