<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카페 주문 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">☕ 카페 주문 관리 시스템</h1>
    <p class="text-muted mb-4">JPA 연관관계 매핑 실습 프로젝트</p>

    <div class="row g-3">
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">👤 회원 관리</h5>
                    <p class="card-text">회원 등록, 조회, 수정, 삭제</p>
                    <a href="/members" class="btn btn-primary">회원 목록</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">🍰 메뉴 관리</h5>
                    <p class="card-text">메뉴 등록, 조회, 수정, 삭제</p>
                    <a href="/menus" class="btn btn-success">메뉴 목록</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">📋 주문 관리</h5>
                    <p class="card-text">주문 등록, 조회, 상태 변경</p>
                    <a href="/orders" class="btn btn-warning">주문 목록</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
