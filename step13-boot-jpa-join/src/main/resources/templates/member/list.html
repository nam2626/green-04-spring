<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">홈</a></li>
            <li class="breadcrumb-item active">회원 목록</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>회원 목록</h2>
        <a href="/members/new" class="btn btn-primary">+ 회원 등록</a>
    </div>

    <div th:if="${message}" class="alert alert-success alert-dismissible" th:text="${message}"></div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>번호</th>
            <th>이름</th>
            <th>이메일</th>
            <th>연락처</th>
            <th>가입일</th>
            <th>주문수</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="member : ${members}">
            <td th:text="${member.id}"></td>
            <td>
                <a th:href="@{/members/{id}(id=${member.id})}"
                   th:text="${member.name}" class="text-decoration-none fw-bold"></a>
            </td>
            <td th:text="${member.email}"></td>
            <td th:text="${member.phone}"></td>
            <td th:text="${#temporals.format(member.createdAt, 'yyyy-MM-dd')}"></td>
            <td th:text="${member.orders.size()} + '건'"></td>  <!--★ @OneToMany 컬렉션 크기 -->
            <td>
                <a th:href="@{/members/{id}/edit(id=${member.id})}"
                   class="btn btn-sm btn-outline-secondary">수정</a>
                <form th:action="@{/members/{id}/delete(id=${member.id})}"
                      method="post" class="d-inline"
                      onsubmit="return confirm('삭제하시겠습니까?')">
                    <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                </form>
            </td>
        </tr>
        <tr th:if="${members.empty}">
            <td colspan="7" class="text-center text-muted">등록된 회원이 없습니다.</td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">← 홈</a>
</div>
</body>
</html>
