<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">홈</a></li>
            <li class="breadcrumb-item"><a href="/members">회원 목록</a></li>
            <li class="breadcrumb-item active" th:text="${member.name}"></li>
        </ol>
    </nav>

    <h2 class="mb-4" th:text="${member.name} + ' 님'"></h2>

    <!-- 회원 정보 -->
    <div class="card mb-4">
        <div class="card-header fw-bold">회원 정보</div>
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-2">이름</dt>
                <dd class="col-sm-10" th:text="${member.name}"></dd>
                <dt class="col-sm-2">이메일</dt>
                <dd class="col-sm-10" th:text="${member.email}"></dd>
                <dt class="col-sm-2">연락처</dt>
                <dd class="col-sm-10" th:text="${member.phone ?: '-'}"></dd>
                <dt class="col-sm-2">가입일</dt>
                <dd class="col-sm-10"
                    th:text="${#temporals.format(member.createdAt, 'yyyy-MM-dd HH:mm')}"></dd>
            </dl>
        </div>
    </div>

    <!-- ★ @OneToMany — 주문 목록 표시 -->
    <div class="card mb-4">
        <div class="card-header fw-bold">
            주문 내역 <span class="badge bg-primary" th:text="${member.orders.size()}"></span>
        </div>
        <div class="card-body p-0">
            <table class="table table-bordered mb-0">
                <thead class="table-light">
                <tr>
                    <th>주문번호</th>
                    <th>주문일시</th>
                    <th>상태</th>
                    <th>바로가기</th>
                </tr>
                </thead>
                <tbody>
                <!-- ★ member.orders 컬렉션 반복 -->
                <tr th:each="order : ${member.orders}">
                    <td th:text="${order.id}"></td>
                    <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <span th:switch="${order.status.name()}">
                            <span th:case="'PENDING'"   class="badge bg-warning text-dark">대기중</span>
                            <span th:case="'CONFIRMED'" class="badge bg-primary">확정</span>
                            <span th:case="'COMPLETED'" class="badge bg-success">완료</span>
                            <span th:case="'CANCELLED'" class="badge bg-secondary">취소</span>
                        </span>
                    </td>
                    <td>
                        <a th:href="@{/orders/{id}(id=${order.id})}"
                           class="btn btn-sm btn-outline-info">상세</a>
                    </td>
                </tr>
                <tr th:if="${member.orders.empty}">
                    <td colspan="4" class="text-center text-muted">주문 내역이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="d-flex gap-2">
        <a th:href="@{/members/{id}/edit(id=${member.id})}" class="btn btn-warning">수정</a>
        <form th:action="@{/members/{id}/delete(id=${member.id})}" method="post"
              onsubmit="return confirm('삭제하시겠습니까? 주문도 모두 삭제됩니다.')">
            <button type="submit" class="btn btn-danger">삭제</button>
        </form>
        <a href="/members" class="btn btn-secondary">목록으로</a>
    </div>
</div>
</body>
</html>
