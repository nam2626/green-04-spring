<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="${member.id != null} ? '회원 수정' : '회원 등록'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4" style="max-width: 500px">
    <h2 th:text="${member.id != null} ? '회원 수정' : '회원 등록'"></h2>

    <form th:action="${member.id != null} ? @{/members/{id}/edit(id=${member.id})} : @{/members}"
          th:object="${member}" method="post" class="mt-3">

        <div class="mb-3">
            <label class="form-label fw-bold">이름 <span class="text-danger">*</span></label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" placeholder="홍길동">
            <div th:errors="*{name}" class="invalid-feedback"></div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">이메일 <span class="text-danger">*</span></label>
            <input type="email" th:field="*{email}" class="form-control"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="hong@example.com">
            <div th:errors="*{email}" class="invalid-feedback"></div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">연락처</label>
            <input type="text" th:field="*{phone}" class="form-control" placeholder="010-0000-0000">
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"
                    th:text="${member.id != null} ? '수정' : '등록'"></button>
            <a th:href="${member.id != null} ? @{/members/{id}(id=${member.id})} : @{/members}"
               class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>
</body>
</html>
