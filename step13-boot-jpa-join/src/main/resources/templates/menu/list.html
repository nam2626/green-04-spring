<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메뉴 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">홈</a></li>
            <li class="breadcrumb-item active">메뉴 관리</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>메뉴 관리</h2>
        <a href="/menus/new" class="btn btn-success">+ 메뉴 등록</a>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>번호</th>
            <th>메뉴명</th>
            <th>카테고리</th>
            <th>가격</th>
            <th>판매상태</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="menu : ${menus}">
            <td th:text="${menu.id}"></td>
            <td th:text="${menu.name}"></td>
            <td th:text="${menu.category}"></td>
            <td th:text="${#numbers.formatInteger(menu.price, 0, 'COMMA')} + '원'"></td>
            <td>
                <span th:if="${menu.available}" class="badge bg-success">판매중</span>
                <span th:unless="${menu.available}" class="badge bg-secondary">품절</span>
            </td>
            <td>
                <a th:href="@{/menus/{id}/edit(id=${menu.id})}"
                   class="btn btn-sm btn-outline-secondary">수정</a>
                <form th:action="@{/menus/{id}/delete(id=${menu.id})}" method="post" class="d-inline"
                      onsubmit="return confirm('삭제하시겠습니까?')">
                    <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                </form>
            </td>
        </tr>
        <tr th:if="${menus.empty}">
            <td colspan="6" class="text-center text-muted">등록된 메뉴가 없습니다.</td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">← 홈</a>
</div>
</body>
</html>
