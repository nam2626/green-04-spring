<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="${menu.id != null} ? '메뉴 수정' : '메뉴 등록'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4" style="max-width: 500px">
    <h2 th:text="${menu.id != null} ? '메뉴 수정' : '메뉴 등록'"></h2>

    <form th:action="${menu.id != null} ? @{/menus/{id}/edit(id=${menu.id})} : @{/menus}"
          th:object="${menu}" method="post" class="mt-3">

        <div class="mb-3">
            <label class="form-label fw-bold">메뉴명 <span class="text-danger">*</span></label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
            <div th:errors="*{name}" class="invalid-feedback"></div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">가격 <span class="text-danger">*</span></label>
            <div class="input-group">
                <input type="number" th:field="*{price}" class="form-control"
                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'" min="100">
                <span class="input-group-text">원</span>
            </div>
            <div th:errors="*{price}" class="invalid-feedback d-block"></div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">카테고리</label>
            <select th:field="*{category}" class="form-select">
                <option value="">-- 선택 --</option>
                <option value="커피">커피</option>
                <option value="음료">음료</option>
                <option value="케이크">케이크</option>
                <option value="푸드">푸드</option>
            </select>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" th:field="*{available}" class="form-check-input" id="available">
            <label for="available" class="form-check-label">판매중</label>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success"
                    th:text="${menu.id != null} ? '수정' : '등록'"></button>
            <a href="/menus" class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>
</body>
</html>
