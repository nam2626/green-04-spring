<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">홈</a></li>
            <li class="breadcrumb-item"><a href="/orders">주문 목록</a></li>
            <li class="breadcrumb-item active">새 주문</li>
        </ol>
    </nav>

    <h2 class="mb-4">새 주문 등록</h2>

    <form th:action="@{/orders}" method="post">

        <!-- 회원 선택 -->
        <div class="mb-4">
            <label class="form-label fw-bold fs-5">회원 선택 <span class="text-danger">*</span></label>
            <select name="memberId" class="form-select" required>
                <option value="">-- 회원을 선택하세요 --</option>
                <!-- ★ members 컬렉션으로 옵션 목록 생성 -->
                <option th:each="m : ${members}"
                        th:value="${m.id}"
                        th:text="${m.name} + ' (' + ${m.email} + ')'">
                </option>
            </select>
        </div>

        <!-- 메뉴 선택 및 수량 입력 -->
        <div class="mb-4">
            <label class="form-label fw-bold fs-5">메뉴 선택</label>
            <p class="text-muted small">수량을 1 이상 입력하면 주문에 포함됩니다. (0 = 미선택)</p>
            <table class="table table-bordered">
                <thead class="table-light">
                <tr>
                    <th>메뉴명</th>
                    <th>카테고리</th>
                    <th>가격</th>
                    <th style="width: 120px">수량</th>
                </tr>
                </thead>
                <tbody>
                <!-- ★ menuItems 컬렉션 반복 — 메뉴별 수량 입력 행 -->
                <tr th:each="menu : ${menuItems}">
                    <td th:text="${menu.name}"></td>
                    <td th:text="${menu.category}"></td>
                    <td th:text="${#numbers.formatInteger(menu.price, 0, 'COMMA')} + '원'"></td>
                    <td>
                        <!-- 병렬 배열로 전송: menuItemIds[i] + quantities[i] -->
                        <input type="hidden" name="menuItemIds" th:value="${menu.id}" />
                        <input type="number" name="quantities"
                               min="0" max="99" value="0"
                               class="form-control form-control-sm text-center" />
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">주문 등록</button>
            <a href="/orders" class="btn btn-secondary">취소</a>
        </div>
    </form>
</div>
</body>
</html>
