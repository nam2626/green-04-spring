<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">홈</a></li>
            <li class="breadcrumb-item active">주문 목록</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>주문 목록</h2>
        <a href="/orders/new" class="btn btn-warning">+ 새 주문</a>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

    <!-- 검색 필터 -->
    <form method="get" th:action="@{/orders}" class="row g-2 mb-3 p-3 bg-light rounded">
        <div class="col-auto">
            <label class="col-form-label">회원</label>
        </div>
        <div class="col-auto">
            <!-- ★ members 컬렉션으로 select 옵션 생성 -->
            <select name="memberId" class="form-select">
                <option value="">전체</option>
                <option th:each="m : ${members}"
                        th:value="${m.id}"
                        th:text="${m.name}"
                        th:selected="${selectedMemberId != null and selectedMemberId == m.id}">
                </option>
            </select>
        </div>
        <div class="col-auto">
            <label class="col-form-label">상태</label>
        </div>
        <div class="col-auto">
            <select name="orderStatus" class="form-select">
                <option value="">전체</option>
                <option th:each="s : ${statuses}"
                        th:value="${s}"
                        th:text="${s.label}"
                        th:selected="${selectedStatus != null and selectedStatus == s}">
                </option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">검색</button>
            <a href="/orders" class="btn btn-outline-secondary">초기화</a>
        </div>
    </form>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>주문번호</th>
            <th>회원명</th>         <!-- ★ JOIN — order.member.name -->
            <th>주문일시</th>
            <th>항목 수</th>        <!-- ★ 컬렉션 크기 -->
            <th>총 금액</th>        <!-- ★ 비즈니스 메서드 -->
            <th>상태</th>
            <th>상세</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td>
                <!-- ★ @ManyToOne 연관 엔티티 접근: order → member -->
                <a th:href="@{/members/{id}(id=${order.member.id})}"
                   th:text="${order.member.name}"
                   class="text-decoration-none"></a>
            </td>
            <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}"></td>
            <td th:text="${order.orderItems.size()} + '개'"></td>   <!-- ★ @OneToMany 컬렉션 크기 -->
            <td th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA')} + '원'"></td>
            <td>
                <span th:switch="${order.status.name()}">
                    <span th:case="'PENDING'"   class="badge bg-warning text-dark">대기중</span>
                    <span th:case="'CONFIRMED'" class="badge bg-primary">확정</span>
                    <span th:case="'COMPLETED'" class="badge bg-success">완료</span>
                    <span th:case="'CANCELLED'" class="badge bg-secondary">취소</span>
                </span>
            </td>
            <td>
                <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-info">상세</a>
            </td>
        </tr>
        <tr th:if="${orders.empty}">
            <td colspan="7" class="text-center text-muted">주문 내역이 없습니다.</td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary">← 홈</a>
</div>
</body>
</html>
