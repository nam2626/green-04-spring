<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">홈</a></li>
            <li class="breadcrumb-item"><a href="/orders">주문 목록</a></li>
            <li class="breadcrumb-item active" th:text="'주문 #' + ${order.id}"></li>
        </ol>
    </nav>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <h2 class="mb-4" th:text="'주문 #' + ${order.id}"></h2>

    <!-- 주문 기본 정보 — ★ @ManyToOne 연관 엔티티 접근 -->
    <div class="card mb-4">
        <div class="card-header fw-bold">주문 정보</div>
        <div class="card-body">
            <dl class="row mb-0">
                <dt class="col-sm-2">주문번호</dt>
                <dd class="col-sm-10" th:text="${order.id}"></dd>
                <!-- ★ order.member.name — @ManyToOne JOIN FETCH 결과 -->
                <dt class="col-sm-2">회원명</dt>
                <dd class="col-sm-10">
                    <a th:href="@{/members/{id}(id=${order.member.id})}"
                       th:text="${order.member.name}"></a>
                </dd>
                <!-- ★ order.member.email — 연관 엔티티 2단계 접근 -->
                <dt class="col-sm-2">이메일</dt>
                <dd class="col-sm-10" th:text="${order.member.email}"></dd>
                <dt class="col-sm-2">주문일시</dt>
                <dd class="col-sm-10"
                    th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm:ss')}"></dd>
                <dt class="col-sm-2">상태</dt>
                <dd class="col-sm-10">
                    <span th:switch="${order.status.name()}">
                        <span th:case="'PENDING'"   class="badge bg-warning text-dark fs-6">대기중</span>
                        <span th:case="'CONFIRMED'" class="badge bg-primary fs-6">확정</span>
                        <span th:case="'COMPLETED'" class="badge bg-success fs-6">완료</span>
                        <span th:case="'CANCELLED'" class="badge bg-secondary fs-6">취소</span>
                    </span>
                </dd>
            </dl>
        </div>
    </div>

    <!-- ★ @OneToMany — orderItems 컬렉션 반복 + @ManyToOne menuItem 접근 -->
    <div class="card mb-4">
        <div class="card-header fw-bold">
            주문 항목
            <span class="badge bg-primary" th:text="${order.orderItems.size()}"></span>
        </div>
        <div class="card-body p-0">
            <table class="table table-bordered mb-0">
                <thead class="table-light">
                <tr>
                    <th>메뉴명</th>
                    <th>카테고리</th>       <!-- ★ item.menuItem.category — 2단계 탐색 -->
                    <th>단가</th>
                    <th>수량</th>
                    <th class="text-end">소계</th>
                </tr>
                </thead>
                <tbody>
                <!-- ★ order.orderItems 컬렉션 순회 -->
                <tr th:each="item : ${order.orderItems}">
                    <td th:text="${item.menuItem.name}"></td>       <!-- ★ @ManyToOne menuItem -->
                    <td th:text="${item.menuItem.category}"></td>   <!-- ★ menuItem.category -->
                    <td th:text="${#numbers.formatInteger(item.unitPrice, 0, 'COMMA')} + '원'"></td>
                    <td th:text="${item.quantity}"></td>
                    <td class="text-end"
                        th:text="${#numbers.formatInteger(item.unitPrice * item.quantity, 0, 'COMMA')} + '원'">
                    </td>
                </tr>
                </tbody>
                <tfoot>
                <tr class="table-primary fw-bold">
                    <td colspan="4" class="text-end">합 계</td>
                    <!-- ★ order.getTotalPrice() — 컬렉션 집계 메서드 -->
                    <td class="text-end"
                        th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA')} + '원'">
                    </td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <!-- 상태 변경 -->
    <div class="card mb-4">
        <div class="card-header fw-bold">상태 변경</div>
        <div class="card-body">
            <form th:action="@{/orders/{id}/status(id=${order.id})}" method="post">
                <div class="input-group" style="max-width: 350px">
                    <select name="status" class="form-select">
                        <option th:each="s : ${statuses}"
                                th:value="${s}"
                                th:text="${s.label}"
                                th:selected="${order.status == s}">
                        </option>
                    </select>
                    <button type="submit" class="btn btn-warning">변경</button>
                </div>
            </form>
        </div>
    </div>

    <div class="d-flex gap-2">
        <form th:action="@{/orders/{id}/delete(id=${order.id})}" method="post"
              onsubmit="return confirm('주문을 삭제하시겠습니까?')">
            <button type="submit" class="btn btn-danger">삭제</button>
        </form>
        <a href="/orders" class="btn btn-secondary">목록으로</a>
    </div>
</div>
</body>
</html>
