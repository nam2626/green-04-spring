<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키오스크 관리 - 메뉴 목록</title>
    <link rel="stylesheet" th:href="@{/css/menu.css}">
</head>
<body>
    <nav>
        <h1>키오스크 관리</h1>
        <a href="/menus">메뉴 목록</a>
        <a href="/menus/new">메뉴 등록</a>
    </nav>
    <div class="container">
        <!-- 컨트롤러에서 전달한 알림 메시지(Flash Attribute)가 있을 경우에만 표시 -->
        <div class="alert-box" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert-box" th:if="${failMessage}" th:text="${failMessage}"></div>

        <!-- 페이지 헤더: 전체 메뉴 건수를 동적으로 계산하여 표시 -->
        <div class="page-header">
            <h2>메뉴 목록 <span th:text="|전체 ${#lists.size(menus)}건|"></span></h2>
            <a href="/menus/new">메뉴 등록</a>
        </div>

        <!-- 검색 필터 영역 -->
        <div class="search-area">
            <form th:action="@{/menus}" method="get">
                <!-- 입력한 검색어 유지 -->
                <input type="text" name="keyword" placeholder="메뉴명 검색" th:value="${keyword}">
                
                <select name="available" id="available">
                    <option value="">판매여부(전체)</option>
                    <option value="true" th:selected="${available == 'true'}">판매중</option>
                    <option value="false" th:selected="${available == 'false'}">품절</option>
                </select>
                
                <button type="submit">검색</button>
                <a th:href="@{/menus}">전체 보기</a>
            </form>
        </div>

        <!-- 카테고리 퀵 필터 버튼들 -->
        <div class="category-filter-area">
            <a th:href="@{/menus}" th:classappend="${category == null} ? 'active'">전체</a>
            <a th:each="cat : ${categories}" 
               th:href="@{/menus(category=${cat})}" 
               th:text="${cat}"
               th:classappend="${category == cat} ? 'active'"></a>
        </div>

        <!-- 메뉴 목록 테이블: 데이터가 없을 때는 표시하지 않음 -->
        <div class="menu-list" th:unless="${#lists.isEmpty(menus)}">
            <table>
                <thead>
                    <tr>
                        <th>번호</th>
                        <th>메뉴명</th>
                        <th>가격</th>
                        <th>카테고리</th>
                        <th>판매여부</th>
                        <th>등록일</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- menus 리스트를 순회하며 행(tr) 생성 -->
                    <tr th:each="menu : ${menus}">
                        <td th:text="${menu.id}"></td>
                        <td th:text="${menu.name}"></td>
                        <!-- 숫자 포맷팅: 1,000원 형식 -->
                        <td th:text="${#numbers.formatInteger(menu.price, 0, 'COMMA')} + '원'"></td>
                        <td th:text="${menu.category}"></td>
                        <!-- 조건부 텍스트 출력 -->
                        <td th:text="${menu.available ? '판매중' : '품절'}"
                            th:style="${menu.available ? 'color:#2ecc71' : 'color:#e74c3c'}"></td>
                        <!-- 날짜 포맷팅 -->
                        <td th:text="${#temporals.format(menu.createdAt, 'yyyy-MM-dd')}"></td>
                        <td>
                            <a th:href="@{/menus/{id}/edit(id=${menu.id})}">수정</a>
                            <a th:href="@{/menus/{id}/delete(id=${menu.id})}" 
                               onclick="return confirm('정말로 삭제하시겠습니까?')">삭제</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- 데이터가 없는 경우의 안내 문구 -->
        <div th:if="${#lists.isEmpty(menus)}" style="text-align: center; padding: 40px; color: #7f8c8d;">
            조회된 메뉴가 없습니다.
        </div>
    </div>
</body>
</html>
