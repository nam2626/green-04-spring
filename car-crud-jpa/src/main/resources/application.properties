spring.application.name=car-crud-jpa

# [JPA / Hibernate 설정]

# ddl-auto: 데이터베이스 스키마 자동 생성 전략
# - update: 변경된 부분만 반영 (기존 데이터 유지)
# - create: 애플리케이션 실행 시 테이블을 삭제 후 다시 생성 (주의!)
# - none: 아무것도 하지 않음 (운영 환경 권장)
spring.jpa.hibernate.ddl-auto=create

# 실행되는 SQL 쿼리를 콘솔에 출력합니다.
spring.jpa.show-sql=true

# SQL을 보기 좋게 정렬하여 출력합니다.
spring.jpa.properties.hibernate.format_sql=true

# 사용하는 데이터베이스 종류(Dialect)에 맞춰 SQL 문법을 최적화합니다.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 서버가 사용할 포트 번호 (기본값 8080)
server.port=8888

# [Thymeleaf 설정]
# 개발 중 HTML 수정 사항을 즉시 확인하기 위해 캐시 기능을 끕니다.
spring.thymeleaf.cache=false

# [데이터베이스(MySQL) 연결 정보]
spring.datasource.url=jdbc:mysql://localhost:3306/car_db
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
