<!DOCTYPE html>
<!-- [완성된 파일 — 수정 불필요] KioskController의 TODO 2를 완성해야 동작합니다. -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>키오스크 - 메뉴 상세</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 30px auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
        th { background: #f0f0f0; width: 100px; }
        .actions { display: flex; gap: 12px; }
        a.btn { padding: 8px 16px; background: #0066cc; color: #fff;
                text-decoration: none; border-radius: 4px; }
        a.btn-back { background: #888; }
    </style>
</head>
<body>
    <h2>메뉴 상세 정보</h2>

    <table>
        <tr>
            <th>메뉴명</th>
            <td th:text="${menu.name}"></td>
        </tr>
        <tr>
            <th>카테고리</th>
            <td th:text="${menu.category}"></td>
        </tr>
        <tr>
            <th>가격</th>
            <td th:text="${menu.price + '원'}"></td>
        </tr>
    </table>

    <div class="actions">
        <a class="btn" th:href="@{/kiosk/orders/new(menuId=${menu.id})}">이 메뉴 주문하기</a>
        <a class="btn btn-back" th:href="@{/kiosk/menus}">목록으로</a>
    </div>
</body>
</html>
