<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>메뉴 목록</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
        h1 { color: #e74c3c; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px 12px; border-bottom: 1px solid #eee; }
        li:hover { background: #fafafa; }
        .count { color: #888; font-size: 0.9rem; margin-bottom: 12px; }
    </style>
</head>
<body>

    <!--
        TODO 3: h1 태그의 텍스트를 th:text로 storeName 값으로 바꾸세요.
               현재 "가게 이름"이라고 표시된 부분을 교체합니다.
    -->
    <h1 th:text="${storeName}">가게 이름</h1>

    <!--
        TODO 4: th:text로 menus 리스트의 크기(size)를 출력하세요.
               힌트: ${#lists.size(menus)}
               현재 "0"이라고 표시된 부분을 교체합니다.
    -->
    <p class="count">전체 메뉴: <strong th:text="${#lists.size(menus)}">0</strong>개</p>

    <ul>
        <!--
            TODO 5: th:each를 사용해 menus 리스트를 반복하면서
                    각 menu 항목을 li 태그에 th:text로 출력하세요.
                    현재 li 태그 하나만 있는 것을 반복 태그로 바꿉니다.
        -->
        <li th:each="menu : ${menus}" th:text="${menu}">메뉴 이름</li>
    </ul>

</body>
</html>
