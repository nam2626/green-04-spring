<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>주문 결과</h1>
    <p>고객명: [[${orderForm.customerName}]]</p>
    <p>메뉴명: <span th:text="${menu.name}"></span></p>
    <p>카테고리: <span th:text="${menu.category}"></span></p>
    <p>수량: <span th:text="${orderForm.quantity}"></span></p>
    <p>요청사항: <span th:text="${orderForm.requestMessage}"></span></p>
    <p>합계: <span th:text="${totalPrice} + '원'"></span></p>
    
    <p><a th:href="@{/menu/list}">메뉴 목록으로</a></p>
</body>
</html>
