<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<h1>주문하기</h1>
	<form th:action="@{/orders}" method="post" th:object="${orderForm}">
		<table>
			<tr>
				<td>고객명</td>
				<td><input type="text" th:field="*{customerName}" placeholder="고객명을 입력하세요"></td>
			</tr>
			<tr>
				<td>메뉴</td>
				<td>
					<select th:field="*{menuId}">
						<option th:each="menu : ${menus}" th:value="${menu.id}" th:text="${menu.name} + '(' + ${menu.price} + '원)'"></option>
					</select>
				</td>
			</tr>
			<tr>
				<td>수량</td>
				<td><input type="number" th:field="*{quantity}" placeholder="수량을 입력하세요" min="1" max="10"></td>
			</tr>
			<tr>
				<td>요청사항</td>
				<td><input type="text" th:field="*{requestMessage}" placeholder="요청사항을 입력하세요"></td>
			</tr>
		</table>
		<button type="submit">주문하기</button>
		<a th:href="@{/menus}">취소</a>
	</form>
</body>
</html>
